# mqtt_ca_cert_path = "/etc/ssl/certs/ca.crt"
# mqtt_username = "speeduino_client"
# mqtt_password = "secure_password_here"
# refresh_rate_ms = 20
# log_level = "info"
# message_buffer_size = 5000

